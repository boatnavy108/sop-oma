const QUESTION_TIME = 45;
const PALETTE = {sop:"#38bdf8", oma:"#f6a623"};
const STORE_KEY="taa_sop_oma_en_v5";
let stats=loadStats(); let session=null; let timer=null;
function loadStats(){try{const r=localStorage.getItem(STORE_KEY);return r?JSON.parse(r):base();}catch(e){return base();}}
function base(){return{cats:{},history:[],quizzes:0};}
function saveStats(){try{localStorage.setItem(STORE_KEY,JSON.stringify(stats));}catch(e){}}
const $=id=>document.getElementById(id);
const totalQ=EXAM.reduce((a,s)=>a+s.questions.length,0);
function catColor(id){return PALETTE[id]||"#f6a623";}
function catName(id){const c=EXAM.find(x=>x.id===id);return c?c.name:id;}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(v){["home","quiz","result"].forEach(x=>$(x).classList.toggle("hidden",x!==v));window.scrollTo(0,0);}

function renderHome(){
  renderPerf();
  const g=$("cardGrid");g.innerHTML="";
  EXAM.forEach(c=>{
    const el=document.createElement("button");el.className="card";el.style.setProperty("--c",catColor(c.id));
    el.innerHTML=`<span class="badge">${c.questions.length} Q</span><span class="ico">${c.icon}</span>
      <div class="code">${c.code}</div><h3>${c.name}</h3><p>${c.desc}</p>`;
    el.onclick=()=>startQuiz(c.id);g.appendChild(el);
  });
  const r=document.createElement("button");r.className="card";r.style.setProperty("--c","#a78bfa");
  r.innerHTML=`<span class="badge all">ALL</span><span class="ico">🎲</span>
    <div class="code" style="background:#a78bfa">ALL</div><h3>All questions</h3><p>Shuffle all ${totalQ} SOP + OM-A questions</p>`;
  r.onclick=()=>startQuiz("__all__");g.appendChild(r);
  $("foot").textContent=`TAA OM-A + A320 SOP · ${totalQ} questions · answers reference manual pages`;
}
function renderPerf(){
  const p=$("perfPanel");
  if(Object.keys(stats.cats).length===0){
    p.innerHTML=`<div class="perf-empty"><div class="ico">📊</div><h3>Your Performance</h3>
      <p>Complete your first quiz to see your score, SOP/OM-A accuracy, and strengths/weaknesses here.</p></div>`;return;
  }
  const cats=Object.entries(stats.cats).map(([id,v])=>({id,name:catName(id),acc:Math.round(v.correct/v.total*100)}));
  const sorted=cats.slice().sort((a,b)=>b.acc-a.acc);const strong=sorted[0],weak=sorted[sorted.length-1];
  const tc=cats.reduce((a,c)=>a+stats.cats[c.id].correct,0),ta=cats.reduce((a,c)=>a+stats.cats[c.id].total,0);
  const overall=Math.round(tc/ta*100);
  const graphic = cats.length>=3 ? radarSVG(cats.map(c=>c.name),cats.map(c=>c.acc)) : barsSVG(cats);
  p.innerHTML=`<div class="perf-head">📊 Your Performance</div>
    <div class="perf-grid"><div class="radar-wrap">${graphic}</div>
      <div><div class="stat-row">
        <div class="stat-box"><div class="n">${overall}%</div><div class="l">Overall accuracy</div></div>
        <div class="stat-box"><div class="n">${stats.quizzes}</div><div class="l">Quizzes taken</div></div></div>
        <div class="sw">
          <div class="tag strong"><div class="cap">Strength</div><div class="v">${strong.name} · ${strong.acc}%</div></div>
          <div class="tag weak"><div class="cap">Weakness</div><div class="v">${weak.name} · ${weak.acc}%</div></div></div>
      </div></div>`;
}
function barsSVG(cats){
  return `<div style="width:180px">`+cats.map(c=>{
    const col=catColor(c.id);
    return `<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:4px">
        <span>${c.name}</span><span style="color:${col}">${c.acc}%</span></div>
      <div style="height:9px;background:var(--line-soft);border-radius:99px;overflow:hidden">
        <div style="width:${c.acc}%;height:100%;background:${col};border-radius:99px"></div></div></div>`;
  }).join("")+`</div>`;
}
function radarSVG(labels,values){
  const N=labels.length,R=64,cx=90,cy=90;
  const pt=(i,r)=>{const a=-Math.PI/2+i*2*Math.PI/N;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];};
  let rings="";[.25,.5,.75,1].forEach(f=>{rings+=`<polygon class="grid-line" points="${labels.map((_,i)=>pt(i,R*f).join(",")).join(" ")}"/>`;});
  let axes="",lbls="",dots="";
  labels.forEach((lb,i)=>{const[x,y]=pt(i,R);axes+=`<line class="axis" x1="${cx}" y1="${cy}" x2="${x}" y2="${y}"/>`;
    const[lx,ly]=pt(i,R+15);const an=Math.abs(lx-cx)<6?"middle":(lx>cx?"start":"end");
    lbls+=`<text x="${lx}" y="${ly+3}" text-anchor="${an}">${lb}</text>`;});
  const area=values.map((v,i)=>pt(i,R*Math.max(v,2)/100).join(",")).join(" ");
  values.forEach((v,i)=>{const[x,y]=pt(i,R*Math.max(v,2)/100);dots+=`<circle class="dot" cx="${x}" cy="${y}" r="2.6"/>`;});
  return `<svg class="radar" width="180" height="180" viewBox="0 0 180 180">${rings}${axes}<polygon class="area" points="${area}"/>${dots}${lbls}</svg>`;
}
function startQuiz(catId){
  let pool,label;
  if(catId==="__all__"){pool=shuffle([].concat(...EXAM.map(c=>c.questions.map(q=>({...q,catId:c.id})))));label="All questions";}
  else{const c=EXAM.find(x=>x.id===catId);pool=shuffle(c.questions.map(q=>({...q,catId:c.id})));label=c.name;}
  session={pool,idx:0,answers:new Array(pool.length).fill(null),label,catId};show("quiz");renderQuestion();
}
function renderQuestion(){
  const s=session,q=s.pool[s.idx];
  $("qNum").textContent=s.idx+1;$("qTotal").textContent=s.pool.length;
  $("qBar").style.width=(s.idx/s.pool.length*100)+"%";
  const qc=$("qCat");qc.innerHTML=`<span>${catName(q.catId)}</span>`+(q.type?`<span class="t">${q.type}</span>`:"");
  qc.style.color=catColor(q.catId);
  $("qText").textContent=q.q;
  const keys=["A","B","C","D","E"];const box=$("qOpts");box.innerHTML="";
  q.choices.forEach((ch,i)=>{const b=document.createElement("button");b.className="opt";
    b.innerHTML=`<span class="key">${keys[i]}</span><span>${ch}</span>`;b.onclick=()=>answer(i);box.appendChild(b);});
  $("qExplain").className="explain";$("nextBtn").classList.add("hidden");
  $("nextBtn").textContent=s.idx===s.pool.length-1?"See results →":"Next →";
  startTimer();
}
function startTimer(){
  stopTimer();const C=2*Math.PI*20;let t=QUESTION_TIME;
  const arc=$("timerArc"),num=$("timerNum"),wrap=$("timer");
  wrap.classList.remove("warn");arc.style.stroke="var(--accent)";num.textContent=t;arc.style.strokeDashoffset=0;
  timer=setInterval(()=>{t--;num.textContent=Math.max(t,0);arc.style.strokeDashoffset=C*(1-t/QUESTION_TIME);
    if(t<=10){wrap.classList.add("warn");arc.style.stroke="var(--red)";}
    if(t<=0){stopTimer();timeUp();}},1000);
}
function stopTimer(){if(timer){clearInterval(timer);timer=null;}}
function lockOptions(chosen,correct){
  const opts=$("qOpts").children;
  for(let k=0;k<opts.length;k++){opts[k].disabled=true;
    if(k===correct)opts[k].classList.add("correct");
    else if(k===chosen)opts[k].classList.add("wrong");else opts[k].classList.add("dim");}
}
function reveal(q,ok,timedout){
  const ex=$("qExplain");ex.className="explain show "+(ok?"ok":"no");
  $("qExplainLbl").textContent=timedout?"⏱ Time\u2019s up":(ok?"✓ Correct":"✕ Incorrect");
  const correctTxt=`Answer: ${["A","B","C","D"][q.answer]}. ${q.choices[q.answer]}`;
  $("qReason").innerHTML=`<div style="font-weight:700;margin-bottom:6px">${correctTxt}</div>`+(q.reason||"");
  $("qRef").innerHTML=q.ref?`<span>📎</span><span>Reference: ${q.ref}</span>`:"";
  $("qRef").style.display=q.ref?"flex":"none";
}
function answer(i){
  const s=session,q=s.pool[s.idx];if(s.answers[s.idx]!==null)return;stopTimer();
  s.answers[s.idx]=i;reveal(q,i===q.answer,false);lockOptions(i,q.answer);
  $("qBar").style.width=((s.idx+1)/s.pool.length*100)+"%";$("nextBtn").classList.remove("hidden");
}
function timeUp(){
  const s=session,q=s.pool[s.idx];if(s.answers[s.idx]!==null)return;
  s.answers[s.idx]=-1;reveal(q,false,true);lockOptions(-1,q.answer);
  $("qBar").style.width=((s.idx+1)/s.pool.length*100)+"%";$("nextBtn").classList.remove("hidden");
}
function nextQuestion(){if(session.idx<session.pool.length-1){session.idx++;renderQuestion();window.scrollTo(0,0);}else finishQuiz();}
function finishQuiz(){
  stopTimer();const s=session;let correct=0;const byCat={};
  s.pool.forEach((q,i)=>{const ok=s.answers[i]===q.answer;if(ok)correct++;
    if(!byCat[q.catId])byCat[q.catId]={c:0,t:0};byCat[q.catId].t++;if(ok)byCat[q.catId].c++;});
  stats.quizzes++;
  Object.entries(byCat).forEach(([id,v])=>{if(!stats.cats[id])stats.cats[id]={correct:0,total:0};
    stats.cats[id].correct+=v.c;stats.cats[id].total+=v.t;});
  stats.history.unshift({label:s.label,correct,total:s.pool.length,
    date:new Date().toLocaleString("en-GB",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})});
  stats.history=stats.history.slice(0,50);saveStats();
  const pct=Math.round(correct/s.pool.length*100);
  $("scoreRing").innerHTML=ringSVG(pct);$("scoreTitle").textContent=`${correct} / ${s.pool.length} correct`;
  $("scoreSub").textContent=`Accuracy ${pct}% · ${s.label} · ${msg(pct)}`;
  const rc=$("resCats");rc.innerHTML="";
  Object.entries(byCat).forEach(([id,v])=>{const p=Math.round(v.c/v.t*100);
    const col=p>=80?"var(--green)":p>=50?"var(--accent)":"var(--red)";
    rc.insertAdjacentHTML("beforeend",`<div class="res-cat"><span class="name">${catName(id)}</span>
      <span class="bar"><i style="width:${p}%;background:${col}"></i></span><span class="sc">${v.c}/${v.t}</span></div>`);});
  $("retryBtn").onclick=()=>startQuiz(s.catId);show("result");
}
function msg(p){return p>=90?"Excellent!":p>=70?"Great":p>=50?"Pass":"Needs review";}
function ringSVG(pct){
  const R=52,C=2*Math.PI*R,off=C*(1-pct/100);const col=pct>=70?"var(--green)":pct>=50?"var(--accent)":"var(--red)";
  return `<svg width="140" height="140" viewBox="0 0 140 140"><circle cx="70" cy="70" r="${R}" fill="none" stroke="var(--line)" stroke-width="11"/>
    <circle cx="70" cy="70" r="${R}" fill="none" stroke="${col}" stroke-width="11" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}" transform="rotate(-90 70 70)" style="transition:stroke-dashoffset .6s"/>
    <text x="70" y="78" text-anchor="middle" font-size="30" font-weight="800" fill="${col}">${pct}%</text></svg>`;
}
function openHistory(){
  const l=$("histList");
  if(!stats.history.length)l.innerHTML=`<div class="hist-empty">No history yet — start your first quiz.</div>`;
  else l.innerHTML=stats.history.map(h=>{const p=Math.round(h.correct/h.total*100);
    return `<div class="hist-item"><div class="src"><div class="t">${h.label}</div><div class="d">${h.date} · ${h.correct}/${h.total}</div></div><div class="score">${p}%</div></div>`;}).join("");
  $("histModal").classList.add("show");
}
function closeHistory(){$("histModal").classList.remove("show");}
function clearHistory(){if(confirm("Clear all history and stats?")){stats=base();saveStats();renderHome();closeHistory();}}
$("histModal").addEventListener("click",e=>{if(e.target.id==="histModal")closeHistory();});
function goHome(){stopTimer();renderHome();show("home");}
renderHome();
</script>
</body>
</html>

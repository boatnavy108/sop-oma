<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAA SOP / OM-A EXAM (EN)</title>
<style>
  :root{
    --bg:#0a0f1c;--bg2:#0c1322;--panel:#111a2c;--panel2:#0f1728;
    --line:#1e293f;--line-soft:#1a2336;--txt:#e7ecf6;--muted:#8b97b0;--muted2:#5f6b85;
    --accent:#f6a623;--accent2:#fbbf24;--accent-glow:rgba(246,166,35,.18);
    --brand:#e8112d;
    --green:#34d399;--green-bg:rgba(52,211,153,.12);--red:#f87171;--red-bg:rgba(248,113,113,.12);
    --blue:#38bdf8;--blue-bg:rgba(56,189,248,.12);--purple:#a78bfa;--purple-bg:rgba(167,139,250,.16);--radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--txt);
    font-family:"Inter","Segoe UI",system-ui,-apple-system,"Sarabun",sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;background:
    radial-gradient(1200px 600px at 80% -10%,rgba(246,166,35,.05),transparent 60%),
    radial-gradient(900px 500px at -10% 8%,rgba(232,17,45,.06),transparent 55%),var(--bg)}
  .wrap{max-width:760px;margin:0 auto;padding:0 18px 90px}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:22px 4px 14px;border-bottom:1px solid var(--line-soft);margin-bottom:22px}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .logo{font-size:22px}
  .brand h1{font-size:19px;font-weight:800;letter-spacing:.6px;color:var(--accent)}
  .brand small{display:block;font-size:11px;color:var(--muted2);font-weight:500;margin-top:1px}
  .hist-btn{display:flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--panel2);
    padding:8px 14px;border-radius:11px;font-size:13px;color:var(--muted);font-weight:600;transition:.18s}
  .hist-btn:hover{border-color:var(--accent);color:var(--accent)}

  .hero{position:relative;border-radius:20px;overflow:hidden;margin-bottom:22px;border:1px solid var(--line)}
  .hero img{width:100%;height:200px;object-fit:cover;display:block;filter:saturate(1.05)}
  .hero .grad{position:absolute;inset:0;background:
    linear-gradient(180deg,rgba(10,15,28,.15) 0%,rgba(10,15,28,.55) 55%,rgba(10,15,28,.96) 100%),
    linear-gradient(100deg,rgba(196,12,38,.5) 0%,rgba(10,15,28,0) 60%)}
  .hero .txt{position:absolute;left:24px;bottom:20px;right:24px}
  .hero .eyebrow{font-size:11.5px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--accent2)}
  .hero h2{font-size:32px;font-weight:900;line-height:1;margin:6px 0 8px;color:#fff;text-shadow:0 2px 14px rgba(0,0,0,.5)}
  .hero p{font-size:12.5px;font-weight:500;color:#cdd6e6;max-width:78%;line-height:1.4}
  .hero .pill{position:absolute;top:16px;right:16px;background:rgba(232,17,45,.92);color:#fff;font-weight:800;font-size:11.5px;padding:5px 12px;border-radius:99px}

  .perf{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:var(--radius);padding:22px;margin-bottom:22px}
  .perf-empty{text-align:center;padding:6px 4px}
  .perf-empty .ico{font-size:28px}
  .perf-empty h3{margin:9px 0 6px;font-size:17px;font-weight:700}
  .perf-empty p{color:var(--muted);font-size:13px;line-height:1.55;max-width:440px;margin:0 auto}
  .perf-head{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:700;margin-bottom:18px}
  .perf-grid{display:grid;grid-template-columns:190px 1fr;gap:20px;align-items:center}
  @media(max-width:560px){.perf-grid{grid-template-columns:1fr}}
  .stat-row{display:flex;gap:10px;margin-bottom:14px}
  .stat-box{flex:1;background:var(--bg2);border:1px solid var(--line-soft);border-radius:12px;padding:12px 14px}
  .stat-box .n{font-size:22px;font-weight:800;color:var(--accent)}
  .stat-box .l{font-size:11px;color:var(--muted);margin-top:2px}
  .sw{display:flex;gap:10px}
  .sw .tag{flex:1;border-radius:11px;padding:11px 13px;font-size:12px}
  .sw .strong{background:var(--green-bg);border:1px solid rgba(52,211,153,.25)}
  .sw .weak{background:var(--red-bg);border:1px solid rgba(248,113,113,.25)}
  .sw .tag .cap{font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;font-weight:700}
  .sw .strong .cap{color:var(--green)}.sw .weak .cap{color:var(--red)}
  .sw .tag .v{font-size:12.5px;font-weight:700;margin-top:3px;line-height:1.3}

  .section-label{font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted2);font-weight:700;margin:24px 4px 14px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:560px){.grid{grid-template-columns:1fr}}
  .card{position:relative;text-align:left;background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line);border-top:4px solid var(--c,var(--accent));border-radius:16px;padding:18px;transition:.18s;overflow:hidden}
  .card:hover{transform:translateY(-3px);border-color:#2c3a58}
  .card .ico{font-size:25px}
  .card .code{display:inline-block;font-size:10px;font-weight:800;color:#0c1322;background:var(--c,var(--accent));border-radius:6px;padding:2px 8px;margin:12px 0 5px}
  .card h3{font-size:16px;font-weight:700;line-height:1.3}
  .card p{font-size:12px;color:var(--muted);line-height:1.45;margin-top:4px}
  .badge{position:absolute;top:14px;right:14px;background:var(--accent);color:#1a1205;font-weight:800;font-size:11px;padding:4px 9px;border-radius:8px}
  .badge.all{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(167,139,250,.4)}
  .foot{margin-top:28px;text-align:center;font-size:11px;color:var(--muted2);line-height:1.6}

  .quiz-head{display:flex;align-items:center;justify-content:space-between;margin:2px 0 12px;gap:12px}
  .back{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:13.5px;font-weight:600}
  .back:hover{color:var(--accent)}
  .qhud{display:flex;align-items:center;gap:14px}
  .qmeta{font-size:13px;color:var(--muted)}.qmeta b{color:var(--accent)}
  .timer{position:relative;width:48px;height:48px;flex:none}
  .timer svg{transform:rotate(-90deg)}
  .timer .num{position:absolute;inset:0;display:grid;place-items:center;font-size:15px;font-weight:800}
  .timer.warn .num{color:var(--red)}
  .progress{height:6px;background:var(--line-soft);border-radius:99px;margin:0 0 20px;overflow:hidden}
  .progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--accent));border-radius:99px;transition:width .3s}
  .qcat{display:inline-flex;gap:8px;align-items:center;font-size:11px;font-weight:700;letter-spacing:.3px;color:var(--accent);
    background:var(--accent-glow);border:1px solid rgba(246,166,35,.3);padding:4px 11px;border-radius:8px;margin-bottom:14px}
  .qcat .t{color:var(--blue);border-left:1px solid rgba(246,166,35,.4);padding-left:8px}
  .qtext{font-size:18.5px;font-weight:700;line-height:1.55;margin-bottom:22px}
  .opts{display:flex;flex-direction:column;gap:11px}
  .opt{display:flex;align-items:flex-start;gap:13px;text-align:left;width:100%;background:var(--panel2);
    border:1.5px solid var(--line);border-radius:13px;padding:15px 16px;font-size:15px;line-height:1.5;transition:.15s}
  .opt:hover:not(:disabled){border-color:#3a4a6e;background:#121b30}
  .opt .key{flex:none;width:26px;height:26px;border-radius:7px;background:var(--line);display:grid;place-items:center;font-size:13px;font-weight:700;color:var(--muted)}
  .opt.correct{border-color:var(--green);background:var(--green-bg)}
  .opt.correct .key{background:var(--green);color:#062b1d}
  .opt.wrong{border-color:var(--red);background:var(--red-bg)}
  .opt.wrong .key{background:var(--red);color:#2b0606}
  .opt.dim{opacity:.5}.opt:disabled{cursor:default}
  .explain{margin-top:18px;background:var(--bg2);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:12px;padding:15px 17px;font-size:14px;line-height:1.6;display:none}
  .explain.show{display:block;animation:fade .25s ease}
  .explain .lbl{font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px}
  .explain.ok{border-left-color:var(--green)}.explain.ok .lbl{color:var(--green)}
  .explain.no{border-left-color:var(--red)}.explain.no .lbl{color:var(--red)}
  .explain .reason{color:var(--txt);margin-bottom:10px}
  .explain .ref{display:flex;gap:7px;align-items:flex-start;font-size:12.5px;color:var(--blue);background:var(--blue-bg);
    border:1px solid rgba(56,189,248,.25);border-radius:9px;padding:8px 11px;font-weight:600}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  .next-bar{display:flex;justify-content:flex-end;margin-top:22px}
  .btn-primary{background:var(--accent);color:#1a1205;font-weight:800;font-size:15px;padding:13px 26px;border-radius:12px;transition:.15s}
  .btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
  .btn-ghost{border:1px solid var(--line);color:var(--muted);font-weight:600;font-size:14px;padding:13px 22px;border-radius:12px}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

  .result-hero{text-align:center;padding:26px 10px 6px}
  .ring{margin:0 auto 16px}
  .result-hero h2{font-size:24px;font-weight:800}
  .result-hero .pct{font-size:14px;color:var(--muted);margin-top:6px}
  .res-cats{margin-top:22px}
  .res-cat{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line-soft)}
  .res-cat:last-child{border-bottom:none}
  .res-cat .name{flex:1;font-size:13.5px;font-weight:600}
  .res-cat .bar{flex:none;width:110px;height:7px;background:var(--line-soft);border-radius:99px;overflow:hidden}
  .res-cat .bar>i{display:block;height:100%;border-radius:99px}
  .res-cat .sc{flex:none;width:52px;text-align:right;font-size:13px;font-weight:700;color:var(--muted)}
  .res-actions{display:flex;gap:12px;margin-top:26px}
  .res-actions>*{flex:1;text-align:center}
  .radar-wrap{display:grid;place-items:center}
  .radar text{fill:var(--muted);font-size:9px;font-weight:600}
  .radar .grid-line{stroke:var(--line);fill:none}
  .radar .axis{stroke:var(--line-soft)}
  .radar .area{fill:rgba(246,166,35,.18);stroke:var(--accent);stroke-width:2;stroke-linejoin:round}
  .radar .dot{fill:var(--accent)}

  .modal{position:fixed;inset:0;background:rgba(5,8,15,.72);backdrop-filter:blur(4px);display:none;align-items:flex-start;justify-content:center;padding:60px 18px;z-index:50;overflow:auto}
  .modal.show{display:flex}
  .sheet{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);width:100%;max-width:520px;padding:24px}
  .sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .sheet-head h3{font-size:18px;font-weight:700}
  .sheet-head button{font-size:20px;color:var(--muted);width:32px;height:32px;border-radius:8px}
  .sheet-head button:hover{background:var(--line)}
  .hist-item{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line-soft);border-radius:12px;margin-bottom:10px}
  .hist-item .src{flex:1}.hist-item .src .t{font-size:14px;font-weight:600}
  .hist-item .src .d{font-size:11.5px;color:var(--muted2);margin-top:2px}
  .hist-item .score{font-size:16px;font-weight:800;color:var(--accent)}
  .hist-empty{text-align:center;color:var(--muted);font-size:13.5px;padding:24px 0}
  .clearbtn{width:100%;margin-top:8px;border:1px solid var(--line);color:var(--red);font-size:13px;font-weight:600;padding:11px;border-radius:11px}
  .clearbtn:hover{background:var(--red-bg);border-color:var(--red)}
  .hidden{display:none!important}
</style>
</head>

bes the communication frequency allocation in the SOP?", "choices": ["VHF 1 is for ACARS and VHF 3 is for ATC", "VHF 1 is for ATC, VHF 2 is for company/121.5 as applicable, and VHF 3 is for ACARS", "VHF 1 is for company and VHF 2 is for ACARS", "Any VHF may be used if the signal is clear"], "answer": 1, "reason": "VHF 1 is dedicated to ATC, VHF 2 is used for company/ATIS/121.5 as applicable, and VHF 3 is dedicated to ACARS.", "ref": "A320 SOP NOR-SOP-01 P 8/28", "type": "Memory"}, {"q": "Below what height/altitude does the sterile cockpit rule apply according to the SOP?", "choices": ["Below FL200", "Below 10,000 ft AAL", "Below MSA only", "From taxi to cruise only"], "answer": 1, "reason": "The sterile cockpit rule applies below 10,000 ft AAL.", "ref": "A320 SOP NOR-SOP-01 P 19/28", "type": "Memory"}, {"q": "To help avoid TCAS RAs caused by a high vertical rate in busy airspace, what vertical speed should be used in the last 2,000 ft of climb or descent?", "choices": ["1,500 ft/min or less", "1,000 ft/min or less", "2,000 ft/min or less", "500 ft/min or less"], "answer": 1, "reason": "Vertical speed should be limited to 1,000 ft/min or less in the last 2,000 ft of climb or descent.", "ref": "A320 SOP NOR-SOP-01 P 24/28", "type": "Memory"}, {"q": "What can the weather radar not directly detect?", "choices": ["Precipitation droplets", "Red or magenta weather cells", "Clear Air Turbulence, fog, or clouds with very small droplets", "Ground returns from terrain"], "answer": 2, "reason": "Weather radar detects precipitation droplets; it does not directly detect clear air turbulence, fog, or small cloud droplets.", "ref": "A320 SOP NOR-SOP-01 P 25/28", "type": "Memory"}, {"q": "According to SOP weather avoidance guidance, red or magenta cells should be avoided by at least how much distance?", "choices": ["5 NM", "10 NM", "20 NM", "40 NM"], "answer": 2, "reason": "The SOP recommends avoiding red or magenta cells by at least 20 NM.", "ref": "A320 SOP NOR-SOP-01 P 26/28", "type": "Memory"}, {"q": "For a non-precision approach using continuous descent, what MDA should be used?", "choices": ["Published MDA", "Published MDA + 50 ft", "Published DA - 50 ft", "MDA at PF discretion"], "answer": 1, "reason": "For an NPA using continuous descent, the MDA used is the published MDA plus 50 ft.", "ref": "A320 SOP NOR-SOP-01 P 14/28", "type": "Memory"}, {"q": "What is the main objective of an operational briefing according to the SOP?", "choices": ["To recite every checklist item", "To identify threats, agree mitigations, and brief deviations from routine operations", "To read the entire OFP word for word", "To confirm only the fuel figure"], "answer": 1, "reason": "The briefing should focus on threat identification, mitigation, and any expected deviations from routine operations.", "ref": "A320 SOP NOR-SOP-02 P 3/12", "type": "Memory"}, {"q": "When is a complete IRS alignment required according to the SOP?", "choices": ["After every engine start", "Before the first flight of the day or when there is a crew change, among other cases", "Only when flying south of the equator", "Only after landing"], "answer": 1, "reason": "Complete IRS alignment is required before the first flight of the day and in cases such as crew change.", "ref": "A320 SOP NOR-SOP-04 P 9/16", "type": "Memory"}, {"q": "During taxi, the runway changes and the previous takeoff performance is no longer suitable. What is the most appropriate action?", "choices": ["Use the original takeoff data to reduce workload", "Have CM2 recompute/revise the FMS while CM1 stops the aircraft for crosscheck", "Correct it after airborne", "Change only the V-speeds without re-briefing"], "answer": 1, "reason": "When takeoff conditions change, takeoff data must be updated; CM2 revises and CM1 crosschecks while stopped.", "ref": "A320 SOP NOR-SOP-11 P 8/10 to 9/10", "type": "Analytical"}, {"q": "You are operating in a mountainous area below 10,000 ft AAL or MSA and weather radar is required due to enroute weather. How should the displays be managed?", "choices": ["Both pilots should select TERR ON ND only", "PF should deselect TERR ON ND to display weather radar, while PM retains TERR ON ND", "PM should turn off all ND displays", "Use the weather radar as a terrain avoidance system"], "answer": 1, "reason": "If weather radar is required, PF should display weather radar while PM retains TERR ON ND for terrain awareness.", "ref": "A320 SOP NOR-SOP-01 P 9/28", "type": "Analytical"}, {"q": "PF is manually flying and no longer intends to follow FD orders. What is the most appropriate action according to the SOP?", "choices": ["Keep the FDs ON at all times", "Turn off the FDs if FD orders are not being used", "Use sidestick override to disconnect the AP every time", "Use managed mode only"], "answer": 1, "reason": "If FD orders are not being used, the FDs should be turned off to avoid misleading guidance.", "ref": "A320 SOP NOR-SOP-01 P 12/28", "type": "Analytical"}, {"q": "During approach, some thunderstorm echoes appear weak, but red/magenta areas are near the flight path. What is the best decision?", "choices": ["Fly through the weak echo because it is not dangerous", "Avoid red/magenta cells by at least 20 NM and deviate upwind when possible", "Fly below the storm if the runway is in sight", "Turn off the radar to reduce distraction"], "answer": 1, "reason": "Weak echo does not mean safe. The SOP calls for avoiding red/ magenta cells by 20 NM and preferably deviating upwind.", "ref": "A320 SOP NOR-SOP-01 P 26/28", "type": "Analytical"}, {"q": "In good weather, the ND shows no weather pattern in MULTISCAN AUTO. What should the crew do to confirm radar operation?", "choices": ["Immediately consider the radar failed", "Temporarily use manual tilt to check ground echoes, then reselect AUTO", "Keep the radar off for the whole flight", "Increase speed so that the radar can detect weather"], "answer": 1, "reason": "In good weather, AUTO mode may show no pattern; temporary manual tilt is used to confirm radar operation with ground echoes.", "ref": "A320 SOP NOR-SOP-01 P 26/28 and PLP-LETDU P 2/6", "type": "Analytical"}, {"q": "A SID has an on-course track more than 75 degrees from the runway track, and the aircraft must reach a specific altitude before turning. Which technique should be used?", "choices": ["Standard acceleration immediately to OptiClimb speed", "Minimum radius turn technique: accelerate to Green Dot and maintain it until 45 degrees from the on-course track, then accelerate", "Maintain V2 until cruise", "Use NAV FPA immediately"], "answer": 1, "reason": "For a turn more than 75 degrees requiring a specific altitude before the turn, use the minimum radius turn technique.", "ref": "A320 SOP NOR-SOP-01 P 21/28 to 22/28", "type": "Analytical"}, {"q": "During a visual approach, the FDs are not helping the crew fly the approach safely or more efficiently. What should be done?", "choices": ["Keep both FDs ON at all times", "Turn both FDs OFF so that A/THR is in SPEED mode when A/THR is active", "Continue managed DES until touchdown", "Always turn A/THR OFF"], "answer": 1, "reason": "During a visual approach, if FDs are not useful, both FDs should be off so A/THR is in SPEED mode when active.", "ref": "A320 SOP NOR-SOP-01 P 12/28", "type": "Analytical"}, {"q": "A normal landing is planned with CONF 3/REV IDLE, but the runway is contaminated or the landing distance criteria are not met. What should be selected?", "choices": ["Continue with CONF 3/REV IDLE in all cases", "The landing should be performed in CONF FULL", "Use CONF 1 to reduce drag", "Cancel the landing in all cases"], "answer": 1, "reason": "If the criteria for CONF 3/REV IDLE are not met, the landing should be performed in CONF FULL.", "ref": "A320 SOP NOR-SOP-01 P 10/28", "type": "Analytical"}, {"q": "Before takeoff, the brake fans are ON and the indicated brake temperature on at least one wheel is 150 deg C or more. What should the crew do?", "choices": ["Continue takeoff if the runway is long", "Delay takeoff", "Turn the brake fans off and take off immediately", "Use REV MAX during takeoff"], "answer": 1, "reason": "With brake fans running, if indicated brake temperature is 150 deg C or more, takeoff must be delayed.", "ref": "A320 SOP NOR-SOP-12 P 2/4", "type": "Analytical"}, {"q": "Line-up clearance is unclear, or CM2 is unsure whether clearance to enter the runway has been received. What is the correct response?", "choices": ["Enter the runway and ask ATC later", "CM2 should call \"STOP THE AIRCRAFT\"; stop the aircraft and verify with ATC", "Use runway markings to decide independently", "Only switch on the landing lights"], "answer": 1, "reason": "If clearance is uncertain, the aircraft must be stopped and ATC clearance verified.", "ref": "A320 SOP NOR-SOP-12 P 2/4", "type": "Analytical"}, {"q": "During an RNAV(RNP) approach, the F-PLN shows TOO STEEP PATH after the FDP. What should the crew do?", "choices": ["Continue using FINAL APP if visual", "Do not use FINAL APP guidance and select another approach", "Add speed constraints to reduce the path", "Delete the missed approach"], "answer": 1, "reason": "When TOO STEEP PATH appears after the FDP, FINAL APP guidance must not be used and another approach should be selected.", "ref": "A320 SOP NOR-SOP-19-C P 23/46", "type": "Analytical"}, {"q": "Early or untimely FLARE mode engagement occurs during approach. Which action is correct according to the SOP?", "choices": ["Ignore it if the aircraft remains stable", "Perform a go-around, or disconnect the AP, set FDs OFF, and continue using raw data/visual references", "Immediately extend more flap", "Reduce thrust to idle"], "answer": 1, "reason": "Early or untimely FLARE mode requires a go-around or disconnecting the AP, FDs OFF, and continuing with raw data/visual references.", "ref": "A320 SOP NOR-SOP-19-C P 6/46", "type": "Analytical"}, {"q": "According to the SOP, carbon brake wear mainly depends on which factors?", "choices": ["Applied brake pressure and braking duration", "Number of brake applications and brake temperature", "Aircraft altitude and cabin pressure", "Runway slope and wind direction only"], "answer": 1, "reason": "The SOP states that carbon brake wear depends on the number of brake applications and brake temperature, not on pressure or duration.", "ref": "A320 SOP NOR-SOP-01 P 5/28", "type": "Memory"}, {"q": "What brake temperature limit applies before takeoff is started?", "choices": ["150 deg C", "250 deg C", "300 deg C", "500 deg C"], "answer": 2, "reason": "The FCOM/SOP limit before takeoff start is 300 deg C.", "ref": "A320 SOP NOR-SOP-01 P 5/28", "type": "Memory"}, {"q": "On a long straight taxiway with no ATC or traffic constraint, what taxi braking technique is recommended to minimize brake wear?", "choices": ["Ride the brakes continuously to keep 10 kt", "Allow acceleration to 30 kt, then use one smooth brake application to decelerate to 10 kt", "Apply short repeated brake pulses every few seconds", "Use parking brake momentarily to reduce brake temperature"], "answer": 1, "reason": "The recommended taxi technique is to allow acceleration to 30 kt and use one smooth brake application to 10 kt.", "ref": "A320 SOP NOR-SOP-01 P 5/28", "type": "Memory"}, {"q": "What does the green DECEL light indicate?", "choices": ["Autobrake has definitely activated", "Actual deceleration has reached 80% of the selected rate", "Manual braking is no longer required", "Reverse thrust has reached maximum reverse"], "answer": 1, "reason": "The DECEL light is a deceleration-rate indication, not a direct autobrake-operation indication.", "ref": "A320 SOP NOR-SOP-01 P 2/28", "type": "Memory"}, {"q": "Why should brake fans not be used during takeoff?", "choices": ["To prevent hydraulic overheat", "To avoid foreign object damage to fans and brakes", "To maintain cabin pressurization", "To improve V1 calculation accuracy"], "answer": 1, "reason": "Brake fans are not used during takeoff to avoid FOD to the fans and brakes.", "ref": "A320 SOP NOR-SOP-01 P 7/28", "type": "Memory"}, {"q": "On descent, below what height must 250 kt not be exceeded according to the SOP?", "choices": ["Below 10,000 ft AAL", "Below 8,000 ft AAL", "Below 5,000 ft AAL", "Below 3,000 ft AAL"], "answer": 2, "reason": "The SOP states that 250 kt must not be exceeded below 5,000 ft AAL on descent.", "ref": "A320 SOP NOR-SOP-01 P 7/28", "type": "Memory"}, {"q": "When should strobe lights be selected ON?", "choices": ["Only after takeoff", "When entering, crossing, or backtracking on the runway", "Only when above 10,000 ft", "Only during night cruise"], "answer": 1, "reason": "Strobe lights are selected ON when entering, crossing or backtracking on the runway.", "ref": "A320 SOP NOR-SOP-01 P 14/28", "type": "Memory"}, {"q": "When the autopilot is OFF, how should FMGS inputs be handled?", "choices": ["PF performs all FMGS inputs directly", "All FMGS inputs are requested by PF and performed by PM", "CM1 performs all MCDU actions regardless of role", "FMGS inputs are prohibited until landing"], "answer": 1, "reason": "With AP OFF, all FMGS inputs are requested by PF and performed by PM.", "ref": "A320 SOP NOR-SOP-01 P 11/28", "type": "Memory"}, {"q": "Which statement describes normal checklists in the SOP?", "choices": ["They are action checklists used to perform the procedure", "They are non-action checklists; actions should be completed from memory before the checklist", "They are performed only by CM1", "They replace ECAM information"], "answer": 1, "reason": "Normal checklists are non-action; procedure actions should be completed from memory before checklist use.", "ref": "A320 SOP NOR-SOP-01 P 16/28", "type": "Memory"}, {"q": "According to the SOP, one-engine taxi should be carried out on departure and arrival at all airports except where?", "choices": ["Only at domestic airports", "Airports not recommended in company NOTAM or OM-C", "Only airports with runways shorter than 2,200 m", "All international airports"], "answer": 1, "reason": "One-engine taxi is normally used except where company NOTAM or OM-C does not recommend it.", "ref": "A320 SOP NOR-SOP-01 P 17/28", "type": "Memory"}, {"q": "If a sidestick is jammed or a crewmember falls on a sidestick, how long must the other pilot press the takeover pushbutton to deactivate the failed sidestick?", "choices": ["At least 5 s", "At least 15 s", "At least 40 s", "Until touchdown only"], "answer": 2, "reason": "Pressing the takeover pushbutton for at least 40 s deactivates a failed/jammed sidestick order.", "ref": "A320 SOP NOR-SOP-01 P 19/28", "type": "Memory"}, {"q": "What are the company minimum thrust reduction/acceleration altitude and minimum engine-out acceleration altitude?", "choices": ["400 ft AAL and 800 ft AAL or FlySmart+ value, whichever is higher", "800 ft AAL and 1,500 ft AAL", "1,000 ft AAL and 3,000 ft AAL", "1,500 ft AAL and 3,000 ft AAL"], "answer": 0, "reason": "The company minimum is 400 ft AAL for thrust reduction/acceleration; minimum EO acceleration is 800 ft AAL or FlySmart+, whichever is higher.", "ref": "A320 SOP NOR-SOP-01 P 21/28", "type": "Memory"}, {"q": "Who must perform a complete exterior walkaround before each flight?", "choices": ["CM1", "CM2", "SCC", "Ground engineer only"], "answer": 0, "reason": "CM1 must perform a complete exterior walkaround before each flight.", "ref": "A320 SOP NOR-SOP-05 P 1/12", "type": "Memory"}, {"q": "During taxi on a long straight taxiway, there is no ATC or traffic constraint. The aircraft is accelerating slowly. Which technique best supports carbon brake life?", "choices": ["Keep light continuous pressure on both brake pedals", "Allow the aircraft to accelerate to about 30 kt, then apply one smooth brake application to 10 kt", "Stop every 100 m to cool the brakes", "Select brake fans during the taxi roll"], "answer": 1, "reason": "This technique reduces the number of brake applications and supports carbon brake life.", "ref": "A320 SOP NOR-SOP-01 P 5/28", "type": "Analytical"}, {"q": "On a dry runway with autobrake LO selected, the DECEL light appears even though reverse thrust alone may achieve the selected deceleration rate. What should the pilot understand?", "choices": ["Autobrake operation is confirmed in all cases", "DECEL indicates the deceleration rate is reached, not necessarily that autobrake is applying pressure", "The brakes have overheated", "Manual braking is prohibited"], "answer": 1, "reason": "DECEL only means the selected deceleration rate has been reached; it is not proof of autobrake pressure application.", "ref": "A320 SOP NOR-SOP-01 P 2/28", "type": "Analytical"}, {"q": "After landing, a BRAKE HOT warning appears but there is no indication of brake binding. What is the best interpretation?", "choices": ["It is always an abnormal condition requiring immediate evacuation", "It should be interpreted as a suggestion to monitor temperature; avoid unnecessary parking brake use at high temperature", "It means the landing was unstable", "It means takeoff may be started immediately"], "answer": 1, "reason": "BRAKE HOT after landing is not automatically abnormal; monitor temperature and avoid unnecessary parking brake use at high temperatures.", "ref": "A320 SOP NOR-SOP-01 P 6/28", "type": "Analytical"}, {"q": "Below 10,000 ft AAL with autopilot ON, PF wants to change the runway in use in the FMGS. What is the most appropriate task-sharing?", "choices": ["PF should perform all changes while PM monitors outside", "PM should perform inputs requiring multiple actions such as changing runway in use", "No FMGS change is allowed under any condition", "Cabin crew should be asked to confirm the runway"], "answer": 1, "reason": "Runway changes require multiple actions and should be performed by PM when below 10,000 ft AAL with AP ON.", "ref": "A320 SOP NOR-SOP-01 P 11/28", "type": "Analytical"}, {"q": "PF is unsure about the aircraft trajectory or proposed target speed in managed mode. What should PF do first?", "choices": ["Wait for the MCDU to correct itself", "Immediately select the appropriate modes and targets on the FCU", "Continue in managed mode until the next waypoint", "Ask ATC to provide the current cost index"], "answer": 1, "reason": "If trajectory or target speed is doubtful, PF selects appropriate FCU modes/targets first.", "ref": "A320 SOP NOR-SOP-01 P 11/28", "type": "Analytical"}, {"q": "Autopilot or flight director guidance becomes unsatisfactory during manual intervention. Which action follows SOP philosophy?", "choices": ["Disconnect AP using the sidestick instinctive disconnect; PM sets FDs OFF if guidance is not satisfactory", "Use sidestick override as the normal way to disconnect AP", "Keep FD bars on even if not following them", "Ignore FMA changes until landing"], "answer": 0, "reason": "The SOP prefers instinctive AP disconnect and FD OFF if guidance is unsatisfactory; sidestick override is not normal except instinctive reaction.", "ref": "A320 SOP NOR-SOP-01 P 12/28", "type": "Analytical"}, {"q": "CM2 is PF for takeoff. After takeoff thrust is set, who controls the thrust levers during the takeoff roll and what happens at V1?", "choices": ["CM2 controls thrust until rotation; CM1 takes over after liftoff", "CM1 takes control once takeoff thrust is set and removes hands from thrust levers at V1", "The autopilot controls thrust levers mechanically", "PM never touches thrust levers during takeoff"], "answer": 1, "reason": "CM1 controls thrust after takeoff thrust setting and removes hands at V1 to avoid inadvertent RTO above V1.", "ref": "A320 SOP NOR-SOP-01 P 20/28", "type": "Analytical"}, {"q": "During landing rollout in crosswind, REV MAX creates directional control difficulty. What should the pilot do to correct toward the centerline?", "choices": ["Increase reverse thrust further", "Reduce reverse thrust to reverse idle and release the brakes", "Select speedbrakes down", "Move both sidesticks simultaneously"], " oids the risk of radiating persons at the gate area.", "ref": "SOP NOR-SOP-22 P 4/8", "type": "Analytical"}, {"q": "The approach was flown in icing conditions and the runway was contaminated with slush. What is the proper flap/slat handling after landing?", "choices": ["Retract flaps immediately after runway vacated", "Do not retract flaps until after engine shutdown and ground crew confirms flaps/slats are clear of ice obstruction", "Extend full flaps for taxi", "Cycle flaps repeatedly during taxi"], "answer": 1, "reason": "The SOP delays flap retraction after icing/contaminated runway until after engine shutdown and ground crew confirmation.", "ref": "SOP NOR-SOP-22 P 4/8", "type": "Analytical"}, {"q": "At parking, chocks are in place and one brake temperature is above 300 deg C. What is the preferred parking brake action if operational conditions permit?", "choices": ["Release the parking brake after chocks are in place", "Keep parking brake ON for the entire turnaround in all cases", "Press brake pedals before releasing parking brake", "Turn brake fans off immediately regardless of temperature"], "answer": 0, "reason": "The SOP says the parking brake should be released after chocks are in place when one brake is above 300 deg C, to reduce heat exposure.", "ref": "SOP NOR-SOP-24 P 7/8", "type": "Analytical"}, {"q": "During aircraft securing, all IR mode selectors have been set to OFF. What should be done before turning off electrical supply?", "choices": ["Wait at least 10 seconds so the ADIRS can memorize latest data", "Turn batteries off immediately", "Turn radar on for a final test", "Select all fuel pumps ON"], "answer": 0, "reason": "The SOP requires waiting at least 10 seconds after ADIRS shutdown before switching off electrical supply.", "ref": "SOP NOR-SOP-25 P 1/2", "type": "Analytical"}, {"q": "During securing, the crew wants to switch off the batteries immediately after turning off the APU. What is the correct consideration?", "choices": ["Switch batteries OFF immediately after APU MASTER OFF", "Wait until the APU flap is fully closed, about 2 minutes after the APU AVAIL light goes out", "Keep batteries ON overnight", "Turn off batteries before the APU is shut down"], "answer": 1, "reason": "The SOP warns to wait until the APU flap is fully closed before switching off batteries.", "ref": "SOP NOR-SOP-25 P 2/2", "type": "Analytical"}, {"q": "In the SOP definitions, which words indicate that the application of a rule, procedure, or provision is mandatory?", "choices": ["May or can", "Should or recommended", "Shall, will, must, or any other imperative verb", "Consider or normally"], "answer": 2, "reason": "The definitions state that shall, will, must, or any other imperative verb indicate a mandatory application.", "ref": "SOP PLP-DOT P 1/2", "type": "Memory"}, {"q": "In the SOP definitions, what does \"should\" indicate?", "choices": ["A mandatory action", "A recommended application of a procedure or provision", "An optional action with no preference", "An emergency-only action"], "answer": 1, "reason": "The SOP defines should as indicating that the application of a procedure or provision is recommended.", "ref": "SOP PLP-DOT P 1/2", "type": "Memory"}, {"q": "What does \"Document Viewer\" mean in the SOP definitions?", "choices": ["A paper binder carried by the captain", "A digital tool that allows operational staff to access and read manuals and reference material online or offline", "A maintenance-only defect recording system", "A cockpit voice recording viewer"], "answer": 1, "reason": "Document Viewer is defined as a digital tool for accessing manuals, SOPs, and reference material online or offline; DocuNet is identified.", "ref": "SOP PLP-DOT P 1/2", "type": "Memory"}, {"q": "What is the SOP policy on handwritten amendments and revisions?", "choices": ["They are permitted when signed by the PIC", "They are permitted only during line training", "They are not permitted", "They are permitted if later uploaded to ut requires the PM to call one thousand to go when passing 1,000 ft before the cleared altitude or FL, and PF replies checked.", "ref": "SOP NOR-SOP-90 P 4/22", "type": "Memory"}, {"q": "Before selecting a new flap position, what does the PM check during the flap callout?", "choices": ["Only that the landing lights are on", "That the speed is appropriate: above S or F and accelerating for takeoff, or below VFE next and decelerating on approach", "Only the ECAM memo color", "Only that the gear is down"], "answer": 1, "reason": "The flap callout requires PM to check speed relative to S/F or VFE next before selecting the flap lever.", "ref": "SOP NOR-SOP-90 P 4/22", "type": "Memory"}, {"q": "During approach, when should PM announce \"SPEED\"?", "choices": ["Only at VAPP exactly", "If speed decreases below target -5 kt or increases above target +10 kt", "Only below 500 ft", "Only if ATC requests speed control"], "answer": 1, "reason": "The approach standard callouts specify SPEED when speed is below target by 5 kt or above target by 10 kt.", "ref": "SOP NOR-SOP-90 P 6-8/22", "type": "Memory"}, {"q": "During approach, when should PM announce \"SINK RATE\"?", "choices": ["When descent rate exceeds 500 ft/min", "When descent rate exceeds 700 ft/min", "When descent rate exceeds 1,000 ft/min", "Only after EGPWS warning"], "answer": 2, "reason": "The approach callout list specifies SINK RATE when descent rate exceeds 1,000 ft/min.", "ref": "SOP NOR-SOP-90 P 6-8/22", "type": "Memory"}, {"q": "For an RNAV (RNP) approach, when is the \"BANK\" callout made?", "choices": ["When bank angle is above 7 deg", "When bank angle is above 15 deg", "When bank angle is above 25 deg", "When bank angle is above 30 deg"], "answer": 3, "reason": "For RNAV (RNP) approach callouts, BANK is announced when bank angle goes above 30 deg.", "ref": "SOP NOR-SOP-90 P 6-8/22", "type": "Memory"}, {"q": "During approach, when should PM announce \"COURSE\"?", "choices": ["When deviation is greater than 1/4 dot only", "When deviation is greater than 1/2 dot, or 2.5 deg for VOR, or 5 deg for ADF", "Only when the runway is in sight", "Only when the aircraft is above MSA"], "answer": 1, "reason": "The approach callouts include COURSE when deviation is greater than 1/2 dot or 2.5 deg for VOR or 5 deg for ADF.", "ref": "SOP NOR-SOP-90 P 6-8/22", "type": "Memory"}, {"q": "What is the PF call for a discontinued approach decision?", "choices": ["GO AROUND - FLAPS", "CANCEL APPROACH", "STOP APPROACH", "APPROACH DISCONTINUED CHECKLIST"], "answer": 1, "reason": "The standard callout table for discontinued approach shows the PF call CANCEL APPROACH.", "ref": "SOP NOR-SOP-90 P 17/22", "type": "Memory"}, {"q": "What is the PF call at the go-around decision?", "choices": ["GO AROUND - FLAPS", "CANCEL APPROACH", "GEAR UP", "AFTER TAKEOFF CHECKLIST"], "answer": 0, "reason": "The go-around standard callout begins with GO AROUND - FLAPS.", "ref": "SOP NOR-SOP-90 P 17/22", "type": "Memory"}, {"q": "When should PF announce \"MANUAL BRAKING\"?", "choices": ["When selecting autobrake MED", "When touching down with reverse idle", "When using the brake pedals", "Only after autobrake MAX is selected"], "answer": 2, "reason": "The standard callout note states that PF announces MANUAL BRAKING when using the brake pedals.", "ref": "SOP NOR-SOP-90 P 17/22", "type": "Memory"}, {"q": "When should PM announce \"AUTOBRAKE OFF\"?", "choices": ["Whenever reverse thrust is selected", "If autobrake does not engage as expected, disengages, or landing is without autobrake and there is no MANUAL BRAKING call from PF", "Only below 70 kt", "Only after the parking checklist"], "answer": 1, "reason": "The SOP note lists these conditions for the AUTOBRAKE OFF callout when no MANUAL BRAKING call has been made.", "ref": "SOP NOR-SOP-90 P 17/22", "type": "Memory"}, {"q": "On ground, when wing anti-ice is switched on, what happens to the anti-ice valves?", "choices": ["They remain fully open until takeoff", "They open for about 30 s for a self-test sequence, then close while on ground", "They cannot open on ground", "They close only after landing"], "answer": 1, "reason": "The after-start section says wing anti-ice valves open for about 30 s for self-test and then close as long as the aircraft is on ground.", "ref": "SOP NOR-SOP-09 P 4/6", "type": "Memory"}, {"q": "If taxiing in icing conditions with rain, slush, or snow, what flap action is required?", "choices": ["Set takeoff flaps immediately after engine start", "Maintain flaps retracted until reaching the holding point of the takeoff runway", "Select CONF FULL for taxi", "Cycle the flaps repeatedly during taxi"], "answer": 1, "reason": "The SOP delays takeoff flap extension in these conditions to prevent contamination of the slat/flap mechanism.", "ref": "SOP NOR-SOP-09 P 4/6; NOR-SOP-10 P 7/18", "type": "Memory"}, {"q": "After pressing the rudder trim RESET pushbutton, what rudder trim indication may the crew observe?", "choices": ["Up to 0.3 deg left or right", "Up to 3.0 deg left or right", "A mandatory zero-only indication", "No indication is displayed"], "answer": 0, "reason": "The SOP note says that after reset the crew may observe an indication of up to 0.3 deg left or right.", "ref": "SOP NOR-SOP-09 P 4/6; NOR-SOP-10 P 7/18", "type": "Memory"}, {"q": "During the ECAM STATUS check after start, what should be checked and what is done if STS appears?", "choices": ["Check only fuel used; ignore STS", "Check that there is no status reminder on E/WD; if STS appears, press STATUS to display the STATUS page", "Check only brake temperature; press CLR", "Check only the memo area; turn off ECAM"], "answer": 1, "reason": "The SOP requires CM2 to check and CM1 to crosscheck no STS reminder; if STS appears, press STATUS.", "ref": "SOP NOR-SOP-09 P 4/6; NOR-SOP-10 P 15/18", "type": "Memory"}, {"q": "Before clearing the ground crew to disconnect, which nosewheel steering memo status should be verified?", "choices": ["NW STRG DISC memo displayed", "NW STRG DISC memo not displayed", "BRAKES HOT memo displayed", "HYD PTU memo displayed"], "answer": 1, "reason": "The after-start procedure requires checking that the NW STRG DISC memo is not displayed before clear to disconnect.", "ref": "SOP NOR-SOP-09 P 5/6", "type": "Memory"}, {"q": "During one-engine taxi departure engine start, what should the crew do if electrical power supply is interrupted and ECAM DUs are lost during the start sequence?", "choices": ["Continue the start in all cases", "Set ENG MASTER 2 OFF and perform a 30 s dry crank", "Select TOGA immediately", "Switch off all radios"], "answer": 1, "reason": "The one-engine taxi procedure states to abort the start by setting ENG MASTER 2 OFF and then perform a 30 s dry crank.", "ref": "SOP NOR-SOP-10 P 11-12/18", "type": "Memory"}, {"q": "For the applicable newer engine standard, what can FADEC command before engine start?", "choices": ["An automatic dry cranking of up to about one minute with N2 limited to 30 percent", "Immediate fuel flow at 0 percent N2", "A mandatory hot start abort", "Automatic thrust reverser deployment"], "answer": 0, "reason": "The SOP notes that FADEC can command automatic dry cranking before start; it may last approximately one minute and limits maximum N2 to 30 percent.", "ref": "SOP NOR-SOP-10 P 12/18", "type": "Memory"}, {"q": "After engine start, what warm-up rule applies before advancing the thrust lever to high power?", "choices": ["No warm-up is required", "Operate the engine at idle or near idle for at least 2 min; taxi time at idle may count", "Only 30 s is required", "Warm-up is required only in icing conditions"], "answer": 1, "reason": "The SOP states that, to avoid thermal shock, the engine should run at idle or near idle for at least 2 min before high power, and taxi time may count.", "ref": "SOP NOR-SOP-10 P 14/18", "type": "Memory"}, {"q": "During one-engine taxi after starting engine 1, the crew keeps the APU running but switches APU BLEED OFF. What is the best reason?", "choices": ["To increase cabin altitude", "To provide power, help prevent electrical transients, enable galley/IFE operation, and avoid engine exhaust gas ingestion through the air conditioning system", "To arm autobrake MAX", "To force both engines to start automatically"], "answer": 1, "reason": "The SOP explains the APU generator and APU BLEED OFF logic during one-engine taxi after start.", "ref": "SOP NOR-SOP-10 P 5-6/18", "type": "Analytical"}, {"q": "During one-engine taxi, the APU has been shut down and the remaining engine must later be started. Which starting method is referenced by the SOP?", "choices": ["Battery start only", "Crossbleed Engine Start procedure", "Windmill start only", "External pneumatic cart only"], "answer": 1, "reason": "The SOP states that if the APU is shut down, the remaining engine should be started using the Crossbleed Engine Start procedure.", "ref": "SOP NOR-SOP-10 P 6/18", "type": "Analytical"}, {"q": "During one-engine taxi, icing conditions are anticipated but no ice is visible yet. What should the crew do?", "choices": ["Wait until ice is visible before selecting engine anti-ice", "Turn on engine anti-ice when icing conditions exist or are anticipated", "Use wing anti-ice only and leave engine anti-ice OFF", "Cancel the taxi in all cases"], "answer": 1, "reason": "The SOP caution says not to wait until seeing ice; engine anti-ice should be used during ground operations when icing conditions exist or are anticipated.", "ref": "SOP NOR-SOP-10 P 6-7/18 Q", "type": "Analytical"}, {"q": "Before releasing the parking brake during one-engine taxi, why is the yellow electric pump selected ON?", "choices": ["To pressurize the yellow hydraulic system for nosewheel steering without using the PTU", "To increase engine idle N1", "To arm spoilers automatically", "To power the ACARS printer"], "answer": 0, "reason": "The SOP says Y ELEC PUMP ON pressurizes the yellow hydraulic system, providing nosewheel steering without PTU use.", "ref": "SOP NOR-SOP-10 P 7/18", "type": "Analytical"}, {"q": "After leaving a congested area, there is a long taxi delay. Under the one-engine taxi procedure, when may the second engine be shut down again?", "choices": ["Whenever the aircraft stops for more than 30 seconds", "If the remaining taxi time exceeds the time required for engine spool-down plus restart and required flows/checklists", "Only after takeoff clearance is received", "Never, once both engines are started"], "answer": 1, "reason": "The SOP allows engine 2 shutdown/restart during taxi when remaining taxi time exceeds the time needed for spool-down, restart, flows, and checklists.", "ref": "SOP NOR-SOP-10 P 15/18", "type": "Analytical"}, {"q": "A crew is preparing an arrival briefing. What should be the main focus according to the SOP?", "choices": ["A memorized reading of all chart details without threat discussion", "Identification of threats, enhancement of safety, and significant differences or deviations from SOP", "Only passenger connections and gate number", "Only fuel price at destination"], "answer": 1, "reason": "The SOP describes arrival briefing as focused on threat identification and safety, with significant differences or deviations from SOP identified.", "ref": "SOP NOR-SOP-02 P 10/12", "type": "Analytical"}, {"q": "In the arrival briefing, which group of items best represents the landing and taxi-in planning elements?", "choices": ["Stop margin, reverse thrust, autobrake, planned runway exit, taxi-in hotspots, special or non-standard operations", "Only the passenger count and meal service", "Only the crew hotel and transportation", "Only the MEL/CDL number"], "answer": 0, "reason": "The arrival briefing structure includes stop margin, reverse thrust, autobrake, planned runway exit, hotspots, and special/non-standard operations.", "ref": "SOP NOR-SOP-02 P 10/12", "type": "Analytical"}, {"q": "During descent below 5,000 ft AAL, ATC does not require a higher speed. ring. What is the correct radio management?", "choices": ["Keep VHF2 on 121.5 MHz and use VHF3 for ATIS/ramp, then switch VHF3 back to DATA", "Use VHF2 for ATIS and stop monitoring 121.5", "Turn off VHF3 permanently", "Use only HF for ATIS"], "answer": 0, "reason": "The cockpit preparation note says VHF2 shall be maintained on 121.5 MHz in China airspace and VHF3 is used for ATIS/ramp then returned to DATA.", "ref": "SOP NOR-SOP-06 P 16-17/34", "type": "Analytical"}, {"q": "On initial departure contact, what information should the pilot normally include?", "choices": ["Only aircraft registration", "SID identifier or assigned heading, passing altitude, and cleared altitude, or as required locally", "Only destination and estimated landing time", "Only passenger count"], "answer": 1, "reason": "The communication section gives this as the correct phraseology for initial ATC contact on departure.", "ref": "SOP NOR-SOP-01 P 8/28", "type": "Analytical"}]}, {"id": "oma", "name": "OM-A", "icon": "📕", "code": "OM-A", "desc": "Operations Manual Part A", "questions": [{"q": "In the OM-A, what is the operational meaning of the words \"shall\", \"will\", and \"must\"?", "choices": ["Optional", "Recommended", "Mandatory", "Simulator guidance only"], "answer": 2, "reason": "The words shall, will, and must indicate mandatory application.", "ref": "OM-A Ch 0 P 0-9", "type": "Memory"}, {"q": "In the OM-A, what do the words \"should\" and \"may\" mean respectively?", "choices": ["Mandatory / prohibited", "Recommended / optional", "Optional / mandatory", "Warning / caution"], "answer": 1, "reason": "Should means recommended; may means optional.", "ref": "OM-A Ch 0 P 0-9", "type": "Memory"}, {"q": "What is the difference between OM-A Part A and Part B?", "choices": ["Part A is type-related, while Part B is training-related", "Part A contains non-type-related policies/procedures, while Part B contains type-related instructions/procedures", "Part A is for cabin crew only, while Part B is for dispatchers only", "Part A is used only in the simulator"], "answer": 1, "reason": "Part A covers non-type-related policies and procedures, while Part B covers type-related procedures and instructions.", "ref": "OM-A Ch 0 P 0-6 to 0-7", "type": "Memory"}, {"q": "What is the Thai AirAsia AOC number shown in the OM-A?", "choices": ["AOC.0001", "AOC.0002", "AOC.0202", "TAA.0002"], "answer": 1, "reason": "The AOC number shown is AOC.0002.", "ref": "OM-A Master Index - AOC page", "type": "Memory"}, {"q": "Which aircraft models are included in the Thai AirAsia Operations Specifications scope?", "choices": ["A320-214, A320-216, A320-251N, and A321-251NX", "B737-800 and A320 only", "A330 and A350 only", "A319 only"], "answer": 0, "reason": "The Operations Specifications include A320-214, A320-216, A320-251N, and A321-251NX.", "ref": "OM-A Master Index - Operations Specifications", "type": "Memory"}, {"q": "What TAA CAT IIIA minima are stated in the OM-A?", "choices": ["DH 100 ft / RVR 300 m", "DH 50 ft / RVR 200 m", "No DH / RVR 75 m", "DH 200 ft / RVR 550 m"], "answer": 1, "reason": "The OM-A states TAA CAT IIIA minima as DH 50 ft and RVR 200 m.", "ref": "OM-A Ch 8 P 8-351", "type": "Memory"}, {"q": "For EDTO/ETOPS in the Operations Specifications, what threshold time and maximum diversion time are stated?", "choices": ["30 min / 60 min", "45 min / 75 min", "60 min / 90 min", "90 min / 120 min"], "answer": 2, "reason": "The EDTO threshold time is 60 min and the maximum diversion time is 90 min.", "ref": "OM-A Master Index - Operations Specifications, page 3 of 5", "type": "Memory"}, {"q": "For recency as Captain or First Officer, how many takeoffs and landings are required in the preceding 90 days?", "choices": ["1 takeoff and 1 landing", "2 takeoffs and 2 landings", "3 takeoffs and 3 landings", "5 takeoffs and 5 landings"], "answer": 2, "reason": "The recency requirement is at least three takeoffs and three landings in the preceding 90 days.", "ref": "OM-A Ch 5 P 5-18", "type": "Memory"}, {"q": "What does the OM-A state regarding Thai AirAsia co-pilots operating from the left-hand seat?", "choices": ["They are always permitted if the Captain agrees", "They are permitted only on night flights", "They are not permitted to operate from the left-hand seat", "They are permitted only during ETOPS"], "answer": 2, "reason": "The OM-A states that co-pilots are not permitted to operate from the left-hand seat.", "ref": "OM-A Ch 5 P 5-18", "type": "Memory"}, {"q": "A flight crew member is no longer considered inexperienced when at least which condition is met?", "choices": ["50 h and 5 sectors", "100 h and 10 sectors within 120 days, or 150 h and 20 sectors", "Always 200 h only", "One OPC after type rating"], "answer": 1, "reason": "The inexperienced status ends with 100 h/10 sectors within 120 days, or 150 h/20 sectors.", "ref": "OM-A Ch 4 P 4-5", "type": "Memory"}, {"q": "What are the cumulative duty hour limits stated in the OM-A?", "choices": ["60 h/7 days, 110 h/14 days, and 190 h/28 days", "70 h/7 days, 120 h/14 days, and 200 h/28 days", "100 h/28 days only", "1,000 h/12 months only"], "answer": 0, "reason": "Cumulative duty limits are 60, 110, and 190 duty hours within 7, 14, and 28 days respectively.", "ref": "OM-A Ch 7 P 7-15", "type": "Memory"}, {"q": "What are the total flight time limits for an operating crew member according to the OM-A?", "choices": ["90 h in 28 days and 900 h in 12 months", "100 h in 28 days and 1,000 h in 12 months", "110 h in 28 days and 1,100 h in 12 months", "No limit if FDP is not exceeded"], "answer": 1, "reason": "Flight time limits are 100 h in 28 days and 1,000 h in 12 months.", "ref": "OM-A Ch 7 P 7-15", "type": "Memory"}, {"q": "The remaining fuel has reduced the planned aerodrome options to one aerodrome, and a changed clearance or additional delay may result in landing with less than final reserve fuel. What should be declared?", "choices": ["PAN PAN MEDICAL", "MINIMUM FUEL", "MAYDAY FUEL immediately in all cases", "No ATC notification is required"], "answer": 1, "reason": "MINIMUM FUEL is used when no planned aerodrome options remain and further delay may result in landing below final reserve.", "ref": "OM-A Ch 8 P 8-269", "type": "Analytical"}, {"q": "The predicted fuel on landing at the nearest aerodrome where a safe landing can be made is less than the planned final reserve fuel. What should be declared?", "choices": ["MINIMUM FUEL", "PAN PAN FUEL", "MAYDAY MAYDAY MAYDAY FUEL", "Fuel normal"], "answer": 2, "reason": "MAYDAY FUEL is required when predicted landing fuel at the nearest safe aerodrome is less than planned final reserve fuel.", "ref": "OM-A Ch 8 P 8-269", "type": "Analytical"}, {"q": "The Commander uses discretion to extend the FDP by more than one hour. After landing, what is the correct reporting action?", "choices": ["No report is required if the aircraft lands safely", "Submit a report to OCC within 72 hours, and TAA submits a copy with comments to CAAT within 28 days", "Inform cabin crew only", "Record it in the tech log only"], "answer": 1, "reason": "Commander discretion must be reported to OCC within 72 h; if the FDP increase exceeds 1 h, TAA sends a copy and comments to CAAT within 28 days.", "ref": "OM-A Ch 7 P 7-14", "type": "Analytical"}, {"q": "A crew member feels fatigued and is in doubt about being able to accomplish assigned duties safely. What should be done?", "choices": ["Continue duty if FDP is not exceeded", "The crew member should not perform duties and must comply with fatigue/fitness requirements", "Drink coffee and continue in all cases", "Wait until the Captain notices the problem"], "answer": 1, "reason": "A crew member must not perform duties when fatigue or fitness may endanger safety, or when in doubt about safe performance.", "ref": "OM-A Ch 7 P 7-11 to 7-12", "type": "Analytical"}, {"q": "For standby other than airport standby, if standby ceases after the first 6 hours, how is the maximum FDP affected?", "choices": ["FDP is unchanged", "FDP is reduced by the amount of standby time exceeding 6 hours", "FDP is increased by 2 hours", "Standby time has no effect"], "answer": 1, "reason": "If standby ceases after the first 6 h, maximum FDP is reduced by the standby time exceeding 6 h.", "ref": "OM-A Ch 7 P 7-19", "type": "Analytical"}, {"q": "If standby starts between 2300 and 0700 local time, when does this period begin to affect FDP reduction?", "choices": ["Immediately from 2300", "When the crew member is contacted by crew movement", "Never", "Only when it is airport standby"], "answer": 1, "reason": "Standby between 2300 and 0700 local time begins to affect FDP reduction when the crew member is contacted.", "ref": "OM-A Ch 7 P 7-19", "type": "Analytical"}, {"q": "A takeoff is planned with RVR 500 m. What type of operation is this, and what is the key approval requirement?", "choices": ["Normal takeoff; it is not LVTO", "LVTO because RVR is below 550 m; specific approval is required only for LVTO with RVR below 400 m", "CAT II takeoff", "CAT III takeoff requiring autoland"], "answer": 1, "reason": "RVR below 550 m is LVTO; specific approval is required only for LVTO with RVR below 400 m.", "ref": "OM-A Ch 8 P 8-337", "type": "Analytical"}, {"q": "If aircraft certified minima, crew rating, or runway aids do not support the intended minima, which statement is most correct?", "choices": ["The operation may continue if the Captain accepts the risk", "Takeoff or landing cannot be executed below the applicable aircraft, crew, or runway minima", "ATC decides the applicable minima for the crew", "It is permitted only in day VMC"], "answer": 1, "reason": "Takeoff or landing cannot be executed below the certified aircraft, crew, or runway minima.", "ref": "OM-A Ch 8 P 8-337", "type": "Analytical"}, {"q": "An emergency situation requires immediate decision and action. What may the PIC do according to the OM-A?", "choices": ["Follow every rule with no exception", "Deviate from rules, procedures, or methods in the interest of safety", "Wait for OCC approval before acting", "Transfer the decision to the FO"], "answer": 1, "reason": "The PIC may deviate from rules/procedures when immediate action is required in the interest of safety.", "ref": "OM-A Ch 1 P 1-33", "type": "Analytical"}, {"q": "If the aircraft is maneuvered in response to an ACAS RA, what is the PIC responsibility?", "choices": ["No report is required if there is no loss of separation", "Submit an ACAS report to CAAT", "Report only on the company frequency", "Report only if maintenance is requested"], "answer": 1, "reason": "An ACAS RA maneuver requires the PIC to submit an ACAS report to CAAT.", "ref": "OM-A Ch 1 P 1-33", "type": "Analytical"}, {"q": "The Commander encounters hazardous weather or flight conditions that may affect the safety of other aircraft. What should be done?", "choices": ["Report to the appropriate ATS unit as soon as possible", "Keep it for the post-flight debrief only", "Inform cabin crew only", "No report is needed if own aircraft has avoided the hazard"], "answer": 0, "reason": "Hazardous weather or flight conditions affecting other aircraft must be reported to ATS as soon as possible.", "ref": "OM-A Ch 1 P 1-33", "type": "Analytical"}, {"q": "A potential bird hazard is observed during flight, and workload allows. What should the crew do?", "choices": ["Notify the ATS unit as soon as workload allows", "Do nothing if there is no bird strike", "Report only in the voyage report", "Declare MAYDAY"], "answer": 0, "reason": "Potential bird hazard should be reported to ATS as soon as workload allows.", "ref": "OM-A Ch 1 P 1-33", "type": "Analytical"}, {"q": "Away from home base, if the FDP involves a time difference of 4 hours or more, what should the minimum rest after the FDP be?", "choices": ["At least 8 hours in all cases", "At least as long as the preceding duty period, or 14 hours, whichever is greater", "No additional rest is required", "Always 2 local nights"], "answer": 1, "reason": "For a time difference of 4 h or more away from base, rest after FDP is at least the preceding duty period or 14 h, whichever is greater.", "ref": "OM-A Ch 7 P 7-23", "type": "Analytical"}, {"q": "Controlled rest on the flight deck may be used under whose discretion?", "choices": ["The SCC only", "The PIC", "The dispatcher only", "Any passenger medical professional"], "answer": 1, "reason": "Controlled rest is used at PIC discretion for fatigue management.", "ref": "OM-A Ch 8 P 8-312", "type": "Memory"}, {"q": "What is the maximum time for an individual controlled rest period?", "choices": ["20 min", "30 min", "45 min", "90 min"], "answer": 2, "reason": "An individual controlled rest period shall not exceed 45 minutes.", "ref": "OM-A Ch 8 P 8-312", "type": "Memory"}, {"q": "After a controlled rest period, what recovery period is required to overcome sleep inertia?", "choices": ["5 min", "10 min", "20 min", "45 min"], "answer": 2, "reason": "A 20-minute recovery period is required after controlled rest to overcome sleep inertia.", "ref": "OM-A Ch 8 P 8-312", "type": "Memory"}, {"q": "Which EFB operation has CAAT approved for Thai AirAsia?", "choices": ["Class 1, Type A only", "Class 2, Type B EFB Operations", "Class 3, Type C only", "No EFB operation is approved"], "answer": 1, "reason": "The OM-A states CAAT approval for Class 2, Type B EFB operations.", "ref": "OM-A Ch 8 P 8-413", "type": "Memory"}, {"q": "In Vistair DocuNet, what should the Mandatory updates tab display before flight duties?", "choices": ["Download available", "No Updates Available", "Validity unknown", "Server disconnected"], "answer": 1, "reason": "The DocuNet Mandatory tab must show No Updates Available; crews must download available mandatory updates before duties.", "ref": "OM-A Ch 8 P 8-422", "type": "Memory"}, {"q": "In Lido mPilot, what does a white cross on a red octagon mean?", "choices": ["Data is fully current", "New data is available but still current", "The application cannot be used until updated", "The device battery is low"], "answer": 2, "reason": "A white cross on a red octagon means the Lido mPilot application cannot be used until updated.", "ref": "OM-A Ch 8 P 8-423", "type": "Memory"}, {"q": "In Mission+, what does amber Device data status indicate?", "choices": ["All data packages are up-to-date", "At least one data package with expiry date is outdated and/ or a package without expiry date differs from the last checked release content", "The device is not in use", "The server is permanently unavailable"], "answer": 1, "reason": "Amber device data status means outdated or mismatched data-package status.", "ref": "OM-A Ch 8 P 8-423 to 8-424", "type": "Memory"}, {"q": "In a total iPads failure, if ACARS is unavailable and there is no other means of obtaining required information, what must the flight crew do?", "choices": ["Continue without any additional action", "Declare urgency to ATC and request the necessary information", "Cancel all checklists", "Ignore destination aerodrome information"], "answer": 1, "reason": "If no ACARS or other means exist after total EFB failure, the crew must declare urgency to ATC and request necessary information.", "ref": "OM-A Ch 8 P 8-426", "type": "Memory"}, {"q": "Which aircraft systems are listed as prone to possible EMI effects from EFB use?", "choices": ["Only cabin lighting and lavatory smoke detectors", "Navigation, communication, autopilot, speed brake auto deploy, autothrust, yaw dampers, and engine fuel control", "Only landing gear and brakes", "Only passenger address system"], "answer": 1, "reason": "The OM-A lists several aircraft systems that may be prone to EMI effects.", "ref": "OM-A Ch 8 P 8-426", "type": "Memory"}, {"q": "What must the PIC do if an EMI occurrence is suspected?", "choices": ["Report it in the Voyage Report", "Only tell cabin crew verbally", "Wait until the next recurrent check", "Do nothing if the flight lands safely"], "answer": 0, "reason": "Suspected EMI must be reported in the Voyage Report.", "ref": "OM-A Ch 8 P 8-426", "type": "Memory"}, {"q": "At the planning stage, what must fuel planning and in-flight re-planning policy ensure with reasonable certainty?", "choices": ["The aircraft can always reach at least one aerodrome where landing is possible", "The aircraft always lands at the destination regardless of weather", "The flight never requires an alternate", "The flight always carries maximum fuel capacity"], "answer": 0, "reason": "Fuel policy should ensure at least one safe-landing aerodrome is available with reasonable certainty.", "ref": "OM-A Ch 8 P 8-10", "type": "Memory"}, {"q": "Discretionary fuel may be uplifted at whose sole discretion?", "choices": ["SCC", "PIC", "ATC", "Ground handling agent"], "answer": 1, "reason": "Discretionary fuel is uplifted at the sole discretion of the PIC.", "ref": "OM-A Ch 8 P 8-84", "type": "Memory"}, {"q": "In cruise, a pilot experiences sudden unexpected fatigue that may become worse during the later high-workload phase. Which option best matches controlled rest policy?", "choices": ["Controlled rest may be used at PIC discretion, cannot be planned before flight, and should occur during low workload in cruise until 30 minutes before planned top of descent", "Controlled rest is allowed during approach if the autopilot is engaged", "Both pilots may rest at the same time if cabin crew monitor the cockpit", "Controlled rest must be planned during dispatch"], "answer": 0, "reason": "Controlled rest is a fatigue countermeasure used at PIC discretion, not preplanned, and limited to low-workload cruise until 30 min before planned top of descent.", "ref": "OM-A Ch 8 P 8-312", "type": "Analytical"}, {"q": "A pilot has just completed a 45-minute controlled rest. What is correct before control of the aircraft is entrusted to that pilot?", "choices": ["He/she may immediately resume control", "A 20-minute recovery period should occur to overcome sleep inertia", "The ally uncertain. What principle should guide the plan?", "choices": ["Ensure, with reasonable certainty, at least one safe-landing aerodrome is available at the estimated time of use", "Plan to continue to destination regardless of weather", "Remove all alternate fuel to increase payload", "Use only passenger convenience as the decision criterion"], "answer": 0, "reason": "The one safe-landing option principle ensures a safe landing aerodrome is available at the estimated time of use.", "ref": "OM-A Ch 8 P 8-10", "type": "Analytical"}, {"q": "The PIC delegates some tasks to suitable personnel during a complex operation. Which statement remains correct?", "choices": ["Delegation removes the PIC overall responsibility", "The PIC must coordinate, supervise and check the delegated tasks", "Delegated tasks require no further monitoring", "Only ATC may delegate flight-deck tasks"], "answer": 1, "reason": "The PIC may delegate tasks but retains coordination, supervision and checking responsibilities.", "ref": "OM-A Ch 1 P 1-33", "type": "Analytical"}, {"q": "A birth or death occurs on board during flight. What must be done according to the PIC responsibilities?", "choices": ["Record the details on the incident/occurrence report form or, if absent, the voyage report", "Ignore it if the flight continues normally", "Report it only to passengers after landing", "Erase CVR data to protect privacy"], "answer": 0, "reason": "The OM-A requires details of birth/death on board to be recorded on the incident/occurrence report form or voyage report.", "ref": "OM-A Ch 1 P 1-32", "type": "Analytical"}, {"q": "Smoke or fire from an iPad lithium battery occurs. Which reference/action is appropriate?", "choices": ["Refer to the QRH smoke/fire from lithium battery procedure and CCM Part I emergency procedures", "Put the iPad in the overhead bin and continue", "Use it until the battery is empty", "Switch off all aircraft electrical power immediately without checklist"], "answer": 0, "reason": ": "What must the PIC ensure when descending from cruise for landing?", "choices": ["Only that cabin service is complete", "That a safe landing can be made considering weather, runway conditions, aircraft performance and other factors", "That fuel is exactly equal to trip fuel", "That all passengers are awake"], "answer": 1, "reason": "The PIC must ensure a safe landing can be made considering weather, runway conditions, aircraft performance and other affecting factors.", "ref": "OM-A PDF p. 159; Chapter 1 p. 1-39 - During Flight", "type": "Memory"}, {"q": "When must a runway braking action special AIREP be reported?", "choices": ["Only when braking is better than reported", "When runway braking action encountered is not as good as reported", "Only on dry runways", "Only after the next sector"], "answer": 1, "reason": "OM-A requires reporting by voice or data link when encountered braking action is not as good as reported.", "ref": "OM-A PDF p. 159; Chapter 1 p. 1-39 - During Flight", "type": "Memory"}, {"q": "For TAA A320 CAT III operations, what is the Alert Height?", "choices": ["50 ft RA", "100 ft RA", "200 ft RA", "No alert height is specified"], "answer": 1, "reason": "OM-A states that for TAA A320, the Alert Height is 100 ft RA.", "ref": "OM-A PDF p. 651; Chapter 8 p. 8-338 - Alert Height", "type": "Memory"}, {"q": "Which statement about CAT III operations is correct?", "choices": ["CAT III weather minima provide sufficient visual reference for manual landing", "An automatic landing system is mandatory for CAT III operations", "CAT III can be performed with raw data only", "Autoland is the same thing as CAT III"], "answer": 1, "reason": "CAT III minima do not provide sufficient visual references for manual landing; an automatic landing system is mandatory.", "ref": "OM-A PDF p. 652; Chapter 8 p. 8-339 - Category III", "type": "Memory"}, {"q": "How long before expiry must flight crew submit soft copies of renewed medical, license, passport or ELP documents?",
